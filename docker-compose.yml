
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MODEL_NAME=sentence-transformers/all-MiniLM-L6-v2
      - FAITHFULNESS_THRESHOLD=0.6
      - MIN_THRESHOLD=0.3
      - MAX_THRESHOLD=0.9
      - MAX_BATCH_ITEMS=50
      - RATE_LIMIT_PER_MINUTE=120
      - RATE_LIMIT_BACKEND=redis
      - REDIS_URL=redis://redis:6379/0
      - REDIS_SOCKET_TIMEOUT_SECONDS=1.0
      - RATE_LIMIT_REDIS_KEY_PREFIX=hallucination-lens:rate-limit
      - MAX_REQUEST_BYTES=1048576
      - TRUSTED_HOSTS=127.0.0.1,localhost
      - ENABLE_GZIP=true
      - GZIP_MINIMUM_SIZE=1024
      - PRELOAD_MODEL_ON_STARTUP=false
      - ENABLE_HSTS=false
      - GATEWAY_AUTH_ENABLED=false
      - GATEWAY_AUTH_HEADER=X-Gateway-Auth
      - GATEWAY_PRINCIPAL_HEADER=X-Principal-Id
      - REQUIRE_GATEWAY_PRINCIPAL=false
      - CORS_ORIGINS=http://127.0.0.1:4176,http://localhost:4176
    ports:
      - "8003:8003"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7.2.5-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    volumes:
      - redis_data:/data

  prometheus:
    image: prom/prometheus:v2.53.4
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9093:9090"
    depends_on:
      api:
        condition: service_healthy

volumes:
  redis_data:
