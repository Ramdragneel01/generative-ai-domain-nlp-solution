
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - MODEL_NAME=sentence-transformers/all-MiniLM-L6-v2
      - FAITHFULNESS_THRESHOLD=0.6
      - MIN_THRESHOLD=0.3
      - MAX_THRESHOLD=0.9
      - MAX_BATCH_ITEMS=50
      - RATE_LIMIT_PER_MINUTE=120
      - MAX_REQUEST_BYTES=1048576
      - TRUSTED_HOSTS=127.0.0.1,localhost
      - ENABLE_GZIP=true
      - GZIP_MINIMUM_SIZE=1024
      - PRELOAD_MODEL_ON_STARTUP=false
      - ENABLE_HSTS=false
      - CORS_ORIGINS=http://127.0.0.1:4176,http://localhost:4176
    ports:
      - "8003:8003"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:v2.53.4
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9093:9090"
    depends_on:
      api:
        condition: service_healthy
