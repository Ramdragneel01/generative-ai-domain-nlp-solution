# Generated by GitHub Copilot
services:
  api:
    image: ${API_IMAGE:?Set API_IMAGE to a published container image}
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - UVICORN_WORKERS=${UVICORN_WORKERS:-2}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - PRELOAD_MODEL_ON_STARTUP=${PRELOAD_MODEL_ON_STARTUP:-true}
      - ENABLE_HSTS=${ENABLE_HSTS:-true}
    ports:
      - "${API_PORT:-8003}:8003"
    read_only: true
    tmpfs:
      - /tmp:size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8003/health', timeout=3).status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:v2.53.4
    profiles: ["monitoring"]
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9093}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      api:
        condition: service_healthy

volumes:
  prometheus_data:
