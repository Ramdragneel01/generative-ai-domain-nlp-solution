# Generated by GitHub Copilot
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

concurrency:
  group: generative-ai-domain-nlp-solution-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency review
        uses: actions/dependency-review-action@v4

  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Install coverage tooling
        run: python -m pip install --upgrade pytest-cov

      - name: Compile check
        run: python -m compileall -q src tests

      - name: Dependency consistency
        run: python -m pip check

      - name: Run lint
        run: ruff check src tests

      - name: Run tests
        run: pytest -q --maxfail=1 --cov=src --cov-report=term-missing:skip-covered
          --cov-fail-under=50

      - name: Build package
        run: python -m build

      - name: API smoke check
        run: |
          python - <<'PY'
          from fastapi.testclient import TestClient
          from hallucination_lens.api import app

          client = TestClient(app)
          response = client.get('/health')
          assert response.status_code == 200
          print(response.json())
          PY

  dependency-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: python -m pip install --upgrade pip-audit

      - name: Audit dependencies
        run: pip-audit -r requirements.txt --progress-spinner off
