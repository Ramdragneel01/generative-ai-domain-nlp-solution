name: Feature request
description: Propose a practical enhancement
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the preferred implementation direction
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
